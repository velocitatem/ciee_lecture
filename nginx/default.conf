server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/pdf application/json text/css text/plain;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /presentation.pdf {
        add_header Cache-Control "public, max-age=300";
    }
}
