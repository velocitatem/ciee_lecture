# Docroot is only presentation.pdf: "/" internally serves the PDF (no HTML).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location = / {
        rewrite ^ /presentation.pdf last;
    }

    location = /presentation.pdf {
        default_type application/pdf;
        add_header Content-Disposition "inline" always;
    }

    location / {
        return 404;
    }
}
