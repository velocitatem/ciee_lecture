<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Presentation</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0f1115;
        --fg: #e8eaed;
        --muted: #9aa0a6;
        --accent: #7aa2f7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }
      header {
        max-width: 56rem;
        margin: 0 auto;
        padding: 1.25rem 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      header h1 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
      }
      header p {
        margin: 0.35rem 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }
      header a {
        color: var(--accent);
      }
      .frame {
        flex: 1;
        min-height: calc(100vh - 5rem);
        padding: 0.75rem 1rem 1.5rem;
      }
      iframe {
        display: block;
        width: min(100%, 72rem);
        height: min(85vh, 52rem);
        margin: 0 auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #1a1d24;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Slides</h1>
      <p>
        <a href="presentation.pdf" download>Download PDF</a>
        · built from the repo on GitHub Actions
      </p>
    </header>
    <div class="frame">
      <iframe src="presentation.pdf" title="Presentation PDF"></iframe>
    </div>
  </body>
</html>
